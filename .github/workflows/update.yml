name: Update Anime Data (Safe Mode)

on:
  schedule:
    - cron: '7 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Hitung jumlah data lama
        id: old_count
        run: |
          if [ -f public/data/anime_master.json ]; then
            echo "count=$(jq '.data | length' public/data/anime_master.json)" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper (safe update)
        run: python scraper.py --mode update --min-data 500 --check-drop

      - name: Hitung jumlah data baru
        id: new_count
        run: echo "count=$(jq '.data | length' public/data/anime_master.json)" >> $GITHUB_OUTPUT

      - name: Validasi data tidak drop drastis
        run: |
          OLD=${{ steps.old_count.outputs.count }}
          NEW=${{ steps.new_count.outputs.count }}
          if [ $OLD -gt 0 ] && [ $NEW -lt $((OLD * 80 / 100)) ]; then
            echo "❌ Data drop terlalu besar (${OLD} → ${NEW})"
            exit 1
          fi
          echo "✅ Data ok (${OLD} → ${NEW})"

      - name: Show log (always)
        if: always()
        run: cat logs/scraper.log || echo "No log yet"

      - name: Tulis metadata update terakhir
        run: |
          UTC_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          WIB_NOW=$(TZ=Asia/Jakarta date +"%Y-%m-%d %H:%M:%S WIB")
          cat <<EOF > public/data/update_meta.json
          {
            "updated_at_utc": "$UTC_NOW",
            "updated_at_wib": "$WIB_NOW",
            "workflow_run_id": "${{ github.run_id }}",
            "source_commit": "${{ github.sha }}"
          }
          EOF

      - name: Tulis ringkasan workflow
        if: always()
        run: |
          echo "## Update Anime Data" >> $GITHUB_STEP_SUMMARY
          echo "- Jumlah lama: ${{ steps.old_count.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Jumlah baru: ${{ steps.new_count.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "- Jadwal: 03:07 WIB / 20:07 UTC" >> $GITHUB_STEP_SUMMARY

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add public/data/anime_master.json public/data/update_meta.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan file yang bisa dikomit."
          else
            if git diff --cached --name-only | grep -q '^public/data/anime_master.json$'; then
              COMMIT_MSG="Auto update anime data [safe]"
            else
              COMMIT_MSG="Auto refresh update metadata [safe]"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi
