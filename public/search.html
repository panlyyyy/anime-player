<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pencarian - Z-Anime</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-shell">
        <header id="mainHeader">
            <div class="logo">ZENSU<span>.</span></div>
            <div class="profile-btn"></div>
        </header>

        <!-- Search Box -->
        <div style="padding: 80px 20px 20px;">
            <div class="search-box" style="background: var(--bg-surface); border-radius: 12px; padding: 5px; display: flex;">
                <input type="text" id="searchInput" placeholder="Cari anime..." style="flex:1; background:none; border:none; color:white; padding:12px;">
                <button id="searchBtn" style="background:var(--accent); border:none; color:white; width:50px; border-radius:10px;"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <!-- Hasil Pencarian -->
        <div id="searchResults" class="anime-grid"></div>

        <!-- Navigation Dock -->
        <nav class="nav-dock">
            <a href="/" class="nav-item"><i class="fas fa-home"></i>Home</a>
            <a href="/search.html" class="nav-item active"><i class="fas fa-search"></i>Cari</a>
            <a href="/ongoing.html" class="nav-item"><i class="fas fa-clapperboard"></i>Tayang</a>
            <a href="/favorites.html" class="nav-item"><i class="fas fa-heart"></i>Favorit</a>
        </nav>
    </div>

    <!-- Player Overlay (salin dari index.html) -->
    <div id="playerOverlay">
        <div class="video-container">
            <button class="close-player"><i class="fas fa-times"></i></button>
            <video id="videoPlayer" controls style="width:100%;height:100%;"></video>
                <iframe
                    id="videoIframe"
                    style="width:100%;height:100%;display:none;"
                    frameborder="0"
                    allow="autoplay; encrypted-media"
                    referrerpolicy="no-referrer">
                </iframe>
        </div>
        <div class="player-info">
            <h1 id="overlayTitle">Solo Leveling</h1>
            <div class="tags" style="justify-content: flex-start; margin-bottom: 10px;">
                <span class="tag" id="currentEpisodeTag">Episode 08</span>
                <span class="tag">1080p</span>
                <select id="overlaySpeedSelect" class="tag" style="background:var(--bg-surface);border:none;">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1.0" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2.0">2x</option>
                </select>
            </div>
            <p id="overlayDescription">Sung Jin-Woo menghadapi tantangan terbesar di dalam dungeon peringkat tinggi. Apakah kekuatannya yang baru bangkit cukup untuk melindungi teman-temannya?</p>

            <h3 style="margin-top: 30px; font-size: 16px;">Episode Selanjutnya</h3>
            <div class="episode-scroll" id="episodeList"></div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/player-overlay.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsContainer = document.getElementById('searchResults');

            function renderList(list) {
                resultsContainer.innerHTML = list.map(anime => UI.renderGridCard(anime)).join('');
                resultsContainer.querySelectorAll('.anime-card').forEach(card => {
                    card.addEventListener('click', async () => {
                        const slug = card.dataset.slug;
                        UI.showLoading(true);
                        try {
                            const res = await API.getDetail(slug);
                            if (res.success) openPlayer(res.data);
                        } finally {
                            UI.showLoading(false);
                        }
                    });
                });
            }

            async function performSearch() {
                const query = searchInput.value.trim();
                if (!query) {
                    resultsContainer.innerHTML = '<div class="empty">Masukkan kata kunci pencarian</div>';
                    return;
                }
                UI.showLoading(true);
                try {
                    const res = await API.search(query);
                    if (res.success) {
                        if (res.data.length === 0) {
                            resultsContainer.innerHTML = '<div class="empty">Tidak ditemukan</div>';
                        } else {
                            renderList(res.data);
                        }
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    UI.showLoading(false);
                }
            }

            // Kalau tidak ada query, tampilkan daftar anime default.
            const initialQ = (new URLSearchParams(window.location.search).get('q') || '').trim();
            if (initialQ) {
                searchInput.value = initialQ;
                performSearch();
            } else {
                (async () => {
                    UI.showLoading(true);
                    try {
                        const res = await API.getAnimeList(1, 50);
                        if (res.success) {
                            renderList(res.data);
                        } else {
                            resultsContainer.innerHTML = '<div class="empty">Tidak ada data</div>';
                        }
                    } catch (err) {
                        console.error(err);
                        resultsContainer.innerHTML = '<div class="empty">Gagal memuat data</div>';
                    } finally {
                        UI.showLoading(false);
                    }
                })();
            }

            let debounceTimer;
            searchInput.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(performSearch, 500);
            });
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') performSearch();
            });
        });
    </script>
</body>
</html>
