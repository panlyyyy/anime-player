<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Generate PWA Icon</title></head>
<body>
  <p>Klik untuk unduh ikon PWA PANLYYY versi wordmark:</p>
  <canvas id="c" width="512" height="512"></canvas>
  <br><a id="a192" download="icon-192.png">Unduh 192x192</a> &nbsp; <a id="a512" download="icon-512.png">Unduh 512x512</a>
  <script>
    function draw(ctx, s) {
      ctx.clearRect(0, 0, s, s);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, s, s);

      ctx.save();
      ctx.translate(s * 0.5, s * 0.54);
      ctx.transform(1, 0, -0.16, 1, 0, 0);
      ctx.font = `900 ${Math.round(s * 0.24)}px Arial Black, Impact, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillText('PANLYYY', s * 0.01, s * 0.014);

      ctx.fillStyle = '#11161d';
      ctx.fillText('PANLYYY', 0, 0);
      ctx.restore();
    }
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    draw(ctx, 512);
    const c192 = document.createElement('canvas');
    c192.width = c192.height = 192;
    draw(c192.getContext('2d'), 192);
    document.getElementById('a192').href = c192.toDataURL('image/png');
    document.getElementById('a512').href = c.toDataURL('image/png');
  </script>
</body></html>
