<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title id="detailPageTitle">Detail Anime - PANLYYY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css?v=1.0.3">
    <link rel="stylesheet" href="/css/nimestream.css?v=1.0.3">
    <style>
        /* Detail page specific styles */
        .anime-hero {
            position: relative;
            height: 60vh;
            min-height: 400px;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            overflow: hidden;
        }
        
        .anime-hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(20px);
            opacity: 0.6;
        }
        
        .anime-hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 2rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
        }
        
        .anime-hero-info {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .anime-poster {
            flex-shrink: 0;
            width: 200px;
            height: 280px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 3px solid rgba(99, 102, 241, 0.3);
        }
        
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .anime-details {
            flex: 1;
            color: white;
        }
        
        .anime-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        
        .anime-meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 1rem;
            color: #a1a1aa;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .anime-genre-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .genre-tag {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .anime-synopsis {
            font-size: 1rem;
            line-height: 1.6;
            color: #e4e4e7;
            max-width: 800px;
            margin-bottom: 2rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
        }
        
        .trailer-section {
            padding: 3rem 2rem;
            background: #1a1a1a;
        }
        
        .section-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: white;
            text-align: center;
        }
        
        .trailer-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .trailer-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
        }
        
        .no-trailer {
            text-align: center;
            color: #a1a1aa;
            font-size: 1.2rem;
            padding: 3rem;
        }
        
        .episodes-section {
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
        }
        
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .episode-card {
            background: linear-gradient(135deg, #3a3a3a, #2a2a2a);
            border: 2px solid #4a4a4a;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .episode-card:hover {
            transform: translateY(-2px);
            border-color: #6366f1;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        
        .episode-number {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .episode-title {
            font-size: 0.9rem;
            color: #a1a1aa;
        }
        
        .no-episodes {
            text-align: center;
            color: #a1a1aa;
            font-size: 1.2rem;
            padding: 3rem;
        }
        
        .warning-message {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin: 2rem auto;
            max-width: 600px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        /* Mobile responsive */
        @media (max-width: 767px) {
            .anime-hero-info {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .anime-poster {
                width: 150px;
                height: 210px;
            }
            
            .anime-title {
                font-size: 1.8rem;
            }
            
            .anime-synopsis {
                font-size: 0.9rem;
            }
            
            .action-buttons {
                justify-content: center;
            }
            
            .episodes-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body class="ns-theme">
    <div class="app-shell ns-shell">
        <header id="mainHeader" class="ns-topnav panlyyy-topnav">
            <div class="ns-topnav-inner">
                <a href="/" class="ns-brand" aria-label="Beranda">
                    <span class="nav-play-icon" aria-hidden="true"><i class="fas fa-play"></i></span>
                    <div class="logo">PAN<span class="logo-accent">LYYY</span></div>
                </a>
                <nav class="ns-desktop-nav" aria-label="Menu utama">
                    <a href="/">Beranda</a>
                    <a href="/search.html">Eksplorasi</a>
                    <a href="/ongoing.html">Ongoing</a>
                    <a href="/favorites.html">Daftar Saya</a>
                </nav>
            </div>
        </header>

        <main id="animeDetailContent">
            <!-- Loading state -->
            <div id="loadingState" style="text-align: center; padding: 4rem; color: white;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <p>Memuat detail anime...</p>
            </div>
        </main>

        <nav class="nav-dock nav-dock-5" aria-label="Navigasi bawah">
            <a href="/" class="nav-item"><i class="fas fa-home"></i>Beranda</a>
            <a href="/search.html" class="nav-item"><i class="fas fa-compass"></i>Eksplor</a>
            <a href="/ongoing.html" class="nav-item"><i class="fas fa-clapperboard"></i>Ongoing</a>
            <a href="/favorites.html" class="nav-item"><i class="fas fa-list"></i>Daftar</a>
            <a href="/history.html" class="nav-item"><i class="fas fa-clock"></i>Riwayat</a>
        </nav>
    </div>

    <script src="/js/layout-shell.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/player-overlay.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const animeSlug = urlParams.get('slug');
            
            if (!animeSlug) {
                window.location.href = '/search.html';
                return;
            }

            loadAnimeDetail(animeSlug);
        });

        async function loadAnimeDetail(slug) {
            try {
                // Load anime master data
                const response = await fetch('/data/anime_master.json');
                const data = await response.json();
                
                const anime = data.data.find(a => a.slug === slug);
                
                if (!anime) {
                    showError('Anime tidak ditemukan');
                    return;
                }

                renderAnimeDetail(anime);
            } catch (error) {
                console.error('Error loading anime detail:', error);
                showError('Gagal memuat detail anime');
            }
        }

        function renderAnimeDetail(anime) {
            document.getElementById('detailPageTitle').textContent = `${anime.title} - PANLYYY`;
            document.title = `${anime.title} - PANLYYY`;
            
            const content = `
                <div class="anime-hero">
                    <div class="anime-hero-bg" style="background-image: url('${anime.image}')"></div>
                    <div class="anime-hero-content">
                        <div class="anime-hero-info">
                            <div class="anime-poster">
                                <img src="${anime.image}" alt="${anime.title}" loading="lazy">
                            </div>
                            <div class="anime-details">
                                <h1 class="anime-title">${anime.title}</h1>
                                <div class="anime-meta-info">
                                    <div class="meta-item">
                                        <i class="fas fa-calendar"></i>
                                        <span>${anime.release_date || 'Unknown'}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-film"></i>
                                        <span>${anime.type || 'TV'}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-clock"></i>
                                        <span>${anime.duration || 'Unknown'}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-star"></i>
                                        <span>${anime.score || 'N/A'}</span>
                                    </div>
                                    <div class="meta-item">
                                        <i class="fas fa-building"></i>
                                        <span>${anime.studio || 'Unknown'}</span>
                                    </div>
                                </div>
                                <div class="anime-genre-tags">
                                    ${(anime.genre || []).map(g => `<span class="genre-tag">${g}</span>`).join('')}
                                </div>
                                <p class="anime-synopsis">${anime.synopsis || 'Tidak ada sinopsis tersedia.'}</p>
                                <div class="action-buttons">
                                    ${anime.episodes && anime.episodes.length > 0 ? 
                                        `<button class="btn-primary" onclick="startWatching()">
                                            <i class="fas fa-play"></i> Mulai Nonton
                                        </button>` : 
                                        `<div class="warning-message">
                                            <i class="fas fa-exclamation-triangle"></i>
                                            <p>Maaf, anime ini belum memiliki episode streaming yang tersedia.</p>
                                            <p>Silakan cek trailer di bawah untuk preview.</p>
                                        </div>`
                                    }
                                    <button class="btn-secondary" onclick="toggleFavorite()">
                                        <i class="fas fa-heart"></i> <span id="favButtonText">Tambah ke Daftar</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                ${anime.trailer ? `
                    <section class="trailer-section">
                        <h2 class="section-title">Trailer</h2>
                        <div class="trailer-container">
                            <iframe src="${anime.trailer.embed_url}" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                        </div>
                    </section>
                ` : ''}

                ${anime.episodes && anime.episodes.length > 0 ? `
                    <section class="episodes-section">
                        <h2 class="section-title">Episode List</h2>
                        <div class="episodes-grid">
                            ${anime.episodes.map((ep, index) => `
                                <div class="episode-card" onclick="playEpisode(${index})">
                                    <div class="episode-number">${ep.number === 1 && ep.title && ep.title.toLowerCase().includes('trailer') ? 'Trailer' : `EP ${ep.number}`}</div>
                                    <div class="episode-title">${ep.number === 1 && ep.title && ep.title.toLowerCase().includes('trailer') ? 'Trailer' : (ep.title || `Episode ${ep.number}`)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                ` : anime.trailer ? '' : `
                    <section class="episodes-section">
                        <div class="no-episodes">
                            <i class="fas fa-film" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                            <p>Belum ada episode atau trailer tersedia untuk anime ini.</p>
                        </div>
                    </section>
                `}
            `;

            document.getElementById('animeDetailContent').innerHTML = content;
            
            // Update favorite button state
            updateFavoriteButton(anime.slug);
            
            // Store current anime data for later use
            window.currentAnime = anime;
        }

        function startWatching() {
            if (window.currentAnime && window.currentAnime.episodes && window.currentAnime.episodes.length > 0) {
                // Play first episode
                const firstEpisode = window.currentAnime.episodes[0];
                openPlayer(window.currentAnime, firstEpisode);
            }
        }

        function playEpisode(episodeIndex) {
            if (window.currentAnime && window.currentAnime.episodes) {
                const episode = window.currentAnime.episodes[episodeIndex];
                openPlayer(window.currentAnime, episode);
            }
        }

        function toggleFavorite() {
            if (!window.currentAnime) return;
            
            const slug = window.currentAnime.slug;
            const isFav = Storage.isFavorite(slug);
            
            if (isFav) {
                Storage.removeFavorite(slug);
            } else {
                Storage.addFavorite(window.currentAnime);
            }
            
            updateFavoriteButton(slug);
        }

        function updateFavoriteButton(slug) {
            const isFav = Storage.isFavorite(slug);
            const favButton = document.getElementById('favButtonText');
            if (favButton) {
                favButton.textContent = isFav ? 'Hapus dari Daftar' : 'Tambah ke Daftar';
            }
        }

        function openPlayer(anime, episode) {
            // Create player overlay with episode data
            const playerData = {
                ...anime,
                currentEpisode: episode,
                episodes: anime.episodes || []
            };
            
            // Use existing player overlay
            UI.showLoading(true);
            setTimeout(() => {
                UI.showLoading(false);
                // Trigger player overlay
                const event = new CustomEvent('openPlayer', { detail: playerData });
                document.dispatchEvent(event);
            }, 500);
        }

        function showError(message) {
            document.getElementById('animeDetailContent').innerHTML = `
                <div style="text-align: center; padding: 4rem; color: white;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; color: #dc2626;"></i>
                    <h2>${message}</h2>
                    <button class="btn-primary" onclick="history.back()" style="margin-top: 2rem;">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
