<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title id="detailPageTitle">Detail Anime - PANLYYY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css?v=1.0.8">
    <link rel="stylesheet" href="/css/nimestream.css?v=1.0.8">
    <style>
        .detail-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .detail-hero {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .detail-poster { 
            width: 100%; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .detail-poster img { width: 100%; height: auto; display: block; }
        .detail-info h1 { 
            font-size: 2rem; 
            margin-bottom: 15px; 
            color: var(--text-primary, #fff);
        }
        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            color: var(--text-secondary, #a1a1aa);
        }
        .detail-meta span { display: flex; align-items: center; gap: 5px; }
        .detail-synopsis { 
            line-height: 1.7; 
            color: var(--text-secondary, #d4d4d8);
            margin-bottom: 20px;
        }
        .detail-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .detail-genre-tag {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .detail-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .btn-watch {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-watch:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3); }
        .btn-fav {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-fav:hover { background: rgba(255,255,255,0.2); }
        .btn-fav.active { background: #ef4444; border-color: #ef4444; }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-primary, #fff);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .trailer-section { margin-bottom: 30px; }
        .trailer-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #1a1a1a;
        }
        .trailer-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .episodes-section { margin-bottom: 30px; }
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .ep-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-primary, #fff);
        }
        .ep-card:hover, .ep-card.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            transform: translateY(-2px);
        }
        .ep-card.trailer-card {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(245, 158, 11, 0.2));
            border-color: rgba(239, 68, 68, 0.5);
        }
        .ep-card.trailer-card:hover {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.3), rgba(245, 158, 11, 0.3));
        }
        
        .notice-box {
            background: rgba(245, 158, 11, 0.1);
            border: 2px solid rgba(245, 158, 11, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #fbbf24;
            margin-bottom: 20px;
        }
        .notice-box i { font-size: 2rem; margin-bottom: 10px; display: block; }
        
        @media (max-width: 768px) {
            .detail-hero { grid-template-columns: 1fr; }
            .detail-poster { max-width: 200px; margin: 0 auto; }
        }
    </style>
</head>
<body class="ns-theme">
    <div class="app-shell ns-shell">
        <header id="mainHeader" class="ns-topnav panlyyy-topnav">
            <div class="ns-topnav-inner">
                <a href="/" class="ns-brand" aria-label="Beranda">
                    <span class="nav-play-icon"><i class="fas fa-play"></i></span>
                    <div class="logo">PAN<span class="logo-accent">LYYY</span></div>
                </a>
            </div>
        </header>

        <main id="mainContent">
            <div class="detail-container">
                <div id="loadingState" style="text-align: center; padding: 60px 20px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #6366f1;"></i>
                    <p style="margin-top: 20px; color: var(--text-secondary);">Memuat detail anime...</p>
                </div>
                <div id="animeDetail" style="display: none;"></div>
            </div>
        </main>

        <nav class="nav-dock nav-dock-5">
            <a href="/" class="nav-item"><i class="fas fa-home"></i>Beranda</a>
            <a href="/search.html" class="nav-item"><i class="fas fa-compass"></i>Eksplor</a>
            <a href="/ongoing.html" class="nav-item"><i class="fas fa-clapperboard"></i>Ongoing</a>
            <a href="/favorites.html" class="nav-item"><i class="fas fa-list"></i>Daftar</a>
            <a href="/history.html" class="nav-item"><i class="fas fa-clock"></i>Riwayat</a>
        </nav>
    </div>

    <script src="/js/layout-shell.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/player-overlay.js"></script>
    <script>
        let currentAnime = null;
        
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            if (!slug) {
                window.location.href = '/search.html';
                return;
            }
            loadAnimeDetail(slug);
        });
        
        async function loadAnimeDetail(slug) {
            try {
                const response = await fetch('/data/anime_master.json');
                const data = await response.json();
                const anime = data.data.find(a => a.slug === slug);
                
                if (!anime) {
                    showError('Anime tidak ditemukan');
                    return;
                }
                
                currentAnime = anime;
                console.log('Loaded anime:', anime); // Debug log
                renderDetail(anime);
            } catch (error) {
                console.error('Error:', error);
                showError('Gagal memuat detail anime');
            }
        }
        
        function renderDetail(anime) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('animeDetail').style.display = 'block';
            document.title = `${anime.title} - PANLYYY`;
            
            const isFav = Storage.isFavorite(anime.slug);
            
            // Separate trailer episode from regular episodes
            let trailerEpisode = null;
            let regularEpisodes = [];
            
            if (anime.episodes) {
                anime.episodes.forEach(ep => {
                    if (ep.number === 0 || (ep.number === 1 && ep.title && ep.title.toLowerCase().includes('trailer'))) {
                        trailerEpisode = ep;
                    } else {
                        regularEpisodes.push(ep);
                    }
                });
            }
            
            const hasYoutubeTrailer = anime.trailer && anime.trailer.embed_url;
            const hasTrailerEpisode = !!trailerEpisode;
            const hasEpisodes = regularEpisodes.length > 0;
            
            console.log('Anime data:', { hasEpisodes, hasYoutubeTrailer, hasTrailerEpisode, episodes: anime.episodes });
            
            let html = `
                <div class="detail-hero">
                    <div class="detail-poster">
                        <img src="${anime.image || '/icons/icon-192.png'}" alt="${anime.title}" loading="lazy">
                    </div>
                    <div class="detail-info">
                        <h1>${anime.title}</h1>
                        <div class="detail-meta">
                            ${anime.score ? `<span><i class="fas fa-star"></i> ${anime.score}</span>` : ''}
                            ${anime.type ? `<span><i class="fas fa-tv"></i> ${anime.type}</span>` : ''}
                            ${anime.status ? `<span><i class="fas fa-broadcast-tower"></i> ${anime.status}</span>` : ''}
                            ${anime.studio ? `<span><i class="fas fa-building"></i> ${anime.studio}</span>` : ''}
                            ${anime.release_date ? `<span><i class="fas fa-calendar"></i> ${anime.release_date}</span>` : ''}
                            ${anime.duration ? `<span><i class="fas fa-clock"></i> ${anime.duration}</span>` : ''}
                        </div>
                        <div class="detail-genres">
                            ${(anime.genre || []).map(g => `<span class="detail-genre-tag">${g}</span>`).join('')}
                        </div>
                        <p class="detail-synopsis">${anime.synopsis || 'Tidak ada sinopsis tersedia.'}</p>
                        <div class="detail-actions">
                            ${hasEpisodes ? `<button class="btn-watch" onclick="playEpisode(0)"><i class="fas fa-play"></i> Tonton Eps 1</button>` : ''}
                            <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFavorite()">
                                <i class="fas ${isFav ? 'fa-heart' : 'fa-heart-o'}"></i> ${isFav ? 'Favorit' : 'Tambah Favorit'}
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            // Trailer Section (YouTube)
            if (hasYoutubeTrailer) {
                html += `
                    <div class="trailer-section">
                        <h2 class="section-title"><i class="fas fa-film"></i> Trailer</h2>
                        <div class="trailer-container">
                            <iframe src="${anime.trailer.embed_url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
            }
            
            // Notice if no episodes but has trailer
            if (!hasEpisodes && (hasYoutubeTrailer || hasTrailerEpisode)) {
                html += `
                    <div class="notice-box">
                        <i class="fas fa-info-circle"></i>
                        <p>Anime ini belum memiliki episode streaming. Silakan tonton trailer di atas.</p>
                    </div>
                `;
            }
            
            // Notice if no episodes and no trailer
            if (!hasEpisodes && !hasYoutubeTrailer && !hasTrailerEpisode) {
                html += `
                    <div class="notice-box" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #f87171;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Maaf, anime ini belum memiliki episode maupun trailer yang tersedia.</p>
                    </div>
                `;
            }
            
            // Episodes Section
            if (hasEpisodes || hasTrailerEpisode) {
                html += `
                    <div class="episodes-section">
                        <h2 class="section-title"><i class="fas fa-list"></i> Episode</h2>
                        <div class="episodes-grid">
                `;
                
                // Trailer episode first
                if (hasTrailerEpisode) {
                    html += `
                        <div class="ep-card trailer-card" onclick="playTrailerEpisode()">
                            <i class="fas fa-film" style="font-size: 1.2rem; margin-bottom: 5px; display: block;"></i>
                            <div>Trailer</div>
                        </div>
                    `;
                }
                
                // Regular episodes
                regularEpisodes.forEach((ep, index) => {
                    html += `
                        <div class="ep-card" onclick="playEpisode(${anime.episodes.indexOf(ep)})">
                            <div>EP ${ep.number}</div>
                        </div>
                    `;
                });
                
                html += `</div></div>`;
            }
            
            document.getElementById('animeDetail').innerHTML = html;
        }
        
        function playEpisode(index) {
            if (!currentAnime || !currentAnime.episodes || !currentAnime.episodes[index]) {
                showError('Episode tidak tersedia');
                return;
            }
            
            const episode = currentAnime.episodes[index];
            console.log('Playing episode:', episode);
            
            // Send event to player-overlay
            const event = new CustomEvent('openPlayer', {
                detail: {
                    anime: currentAnime,
                    episode: episode
                }
            });
            document.dispatchEvent(event);
        }
        
        function playTrailerEpisode() {
            if (!currentAnime || !currentAnime.episodes) return;
            
            const trailerEp = currentAnime.episodes.find(ep => 
                ep.number === 0 || (ep.number === 1 && ep.title && ep.title.toLowerCase().includes('trailer'))
            );
            
            if (trailerEp) {
                const event = new CustomEvent('openPlayer', { 
                    detail: { anime: currentAnime, episode: trailerEp } 
                });
                document.dispatchEvent(event);
            }
        }
        
        function toggleFavorite() {
            if (!currentAnime) return;
            
            const isFav = Storage.isFavorite(currentAnime.slug);
            if (isFav) {
                Storage.removeFavorite(currentAnime.slug);
            } else {
                Storage.addFavorite(currentAnime);
            }
            
            // Re-render to update button
            renderDetail(currentAnime);
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('animeDetail').innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ef4444; margin-bottom: 20px;"></i>
                    <h2 style="color: var(--text-primary);">${message}</h2>
                    <button class="btn-watch" onclick="history.back()" style="margin-top: 20px;">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </button>
                </div>
            `;
            document.getElementById('animeDetail').style.display = 'block';
        }
    </script>
</body>
</html>
